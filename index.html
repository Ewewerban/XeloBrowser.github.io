<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XeloBrowser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="left-controls" onclick="refreshPage()">
            <div class="brand-name-top">🐆 XeloBrowser</div>
        </div>
        <button class="incognito-btn">Incognito Mode</button>
    </div>

    <div class="main-content">
        
        <div class="brand">
            <div class="brand-mascot-container">
                <img src="https://openmoji.org/data/color/svg/1F406.svg" alt="Leopard" class="brand-mascot-img">
            </div>
            <h1>XeloBrowser</h1>
        </div>

        <div class="search-area">
            <div class="search-box">
                <input type="text" id="search-in" placeholder="Search the web with Google..." onkeydown="handleEnter(event)" autocomplete="off" autofocus>
            </div>
        </div>

        <div class="shortcuts-grid" id="shortcuts-grid"></div>

        <div class="history-box">
            <div class="history-header">
                <span>SEARCH HISTORY</span>
                <span class="history-clear" onclick="clearHistory()">Clear</span>
            </div>
            <div class="history-items" id="hist-list"></div>
        </div>
    </div>

    <script>
        let historyData = [];
        let tiles = [
            { name: "Discord", url: "https://discord.com", icon: "💬" },
            { name: "YouTube", url: "https://youtube.com", icon: "📺" },
            { name: "GitHub", url: "https://github.com", icon: "🐙" }
        ];

        // Load data from LocalStorage/Cookies
        window.onload = function() {
            try {
                const storedHistory = localStorage.getItem('x_hist');
                if (storedHistory) historyData = JSON.parse(storedHistory);

                const storedTiles = localStorage.getItem('x_tiles');
                if (storedTiles) tiles = JSON.parse(storedTiles);
            } catch(e) {
                console.error("Local storage error:", e);
            }
            renderHistory();
            renderTiles();
        };

        function handleEnter(e) {
            if (e.key === 'Enter') {
                searchInGoogle(e.target.value);
            }
        }

        // Redirect directly to Google within the same WebView2 tab
        function searchInGoogle(rawQuery) {
            const query = rawQuery.trim();
            if (!query) return;

            // Save to history before navigating away
            historyData = historyData.filter(x => x !== query);
            historyData.unshift(query);
            if(historyData.length > 5) historyData.pop();
            
            try { 
                localStorage.setItem('x_hist', JSON.stringify(historyData)); 
            } catch(e) {}

            // Navigate to Google search results
            window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }

        function refreshPage() {
            window.location.reload();
        }

        function renderHistory() {
            const list = document.getElementById('hist-list'); 
            list.innerHTML = '';
            
            if (historyData.length === 0) { 
                list.innerHTML = '<div class="empty-history">No recent searches</div>'; 
                return; 
            }
            
            historyData.forEach((item, idx) => {
                list.innerHTML += `
                    <div class="history-row">
                        <span class="history-text" onclick="searchInGoogle('${item}')">🔍 ${item}</span>
                        <span class="history-del" onclick="deleteHistory(${idx})">×</span>
                    </div>
                `;
            });
        }

        function deleteHistory(idx) {
            historyData.splice(idx, 1);
            renderHistory();
            try { localStorage.setItem('x_hist', JSON.stringify(historyData)); } catch(e) {}
        }

        function clearHistory() {
            historyData = [];
            renderHistory();
            try { localStorage.removeItem('x_hist'); } catch(e) {}
        }

        function renderTiles() {
            const grid = document.getElementById('shortcuts-grid'); 
            grid.innerHTML = '';
            
            tiles.forEach((tile, index) => {
                grid.innerHTML += `
                    <div class="tile-wrapper">
                        <button class="tile-delete-btn" onclick="deleteTile(${index})">×</button>
                        <a href="${tile.url}" class="tile">
                            <div class="tile-icon">${tile.icon}</div>
                            <div class="tile-name-txt">${tile.name}</div>
                        </a>
                    </div>
                `;
            });
            
            grid.innerHTML += `
                <div class="tile-wrapper" onclick="addTile()">
                    <div class="tile">
                        <div class="tile-icon tile-add">＋</div>
                        <div class="tile-name-txt">Add</div>
                    </div>
                </div>
            `;
        }

        function addTile() {
            const name = prompt("Enter shortcut name:"); 
            if (!name) return;
            let url = prompt("Enter URL address:"); 
            if (!url) return;
            
            if (!url.startsWith('http')) url = 'https://' + url;
            
            tiles.push({ name, url, icon: "🌐" }); 
            renderTiles();
            try { localStorage.setItem('x_tiles', JSON.stringify(tiles)); } catch(e) {}
        }

        function deleteTile(idx) {
            tiles.splice(idx, 1); 
            renderTiles();
            try { localStorage.setItem('x_tiles', JSON.stringify(tiles)); } catch(e) {}
        }
    </script>
</body>
</html>
