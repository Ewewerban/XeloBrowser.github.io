<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloBrowser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #202124;
        }
        /* Pasek narzędzi na górze */
        .toolbar {
            display: flex;
            align-items: center;
            background-color: #2f3136;
            padding: 8px;
            gap: 8px;
            border-bottom: 1px solid #1c1e21;
        }
        /* Przyciski nawigacji */
        .btn {
            background: none;
            border: none;
            color: #white;
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: #e8eaed;
        }
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        /* Pasek adresu */
        .address-bar {
            flex-grow: 1;
            background-color: #202124;
            border: 1px solid #5f6368;
            color: #e8eaed;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }
        .address-bar:focus {
            border-color: #8ab4f8;
            background-color: #282a2d;
        }
        /* Okno wyświetlania stron */
        .browser-content {
            width: 100%;
            height: calc(100% - 49px);
            border: none;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn" onclick="goBack()">←</button>
        <button class="btn" onclick="goForward()">→</button>
        <button class="btn" onclick="reloadPage()">↻</button>
        <button class="btn" onclick="goHome()">⌂</button>
        <input type="text" id="url-input" class="address-bar" value="https://www.bing.com" onkeydown="checkEnter(event)">
    </div>

    <iframe id="web-frame" class="browser-content" src="https://www.bing.com"></iframe>

    <script>
        const frame = document.getElementById('web-frame');
        const urlInput = document.getElementById('url-input');
        const homeUrl = "https://www.bing.com"; // Używamy Bing, bo Google blokuje wyświetlanie w ramkach

        function navigate() {
            let url = urlInput.value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            urlInput.value = url;
            frame.src = url;
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                navigate();
            }
        }

        function goHome() {
            urlInput.value = homeUrl;
            frame.src = homeUrl;
        }

        function reloadPage() {
            frame.src = frame.src;
        }

        // Podstawowe funkcje wstecz/dalej dla ramki
        function goBack() {
            window.history.back();
        }
        function goForward() {
            window.history.forward();
        }
    </script>
</body>
</html>
