<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloBrowser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Roboto, arial, sans-serif;
            background-color: #202124;
            color: #f1f3f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- PASEK GÓRNY (NAWIĄZANIE DO DEKTOPA USERA) --- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background-color: #202124;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .mascot-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .brand-name-top {
            font-weight: 500;
            font-size: 14px;
            color: #fff;
        }

        .incognito-btn {
            background: #303134;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e8eaed;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        /* --- MAIN LAYER --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #202124;
        }

        /* --- WIDOK 1: PULPIT STARTOWY VELOBROWSER (IDEALNE ODWZOROWANIE) --- */
        #dashboard-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding-bottom: 80px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 28px;
        }

        .brand-mascot {
            font-size: 60px;
            user-select: none;
        }

        .brand h1 {
            font-size: 40px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .search-area {
            width: 100%;
            max-width: 584px;
            position: relative;
            margin-bottom: 40px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 46px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background-color: #202124;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box input:focus {
            background-color: #303134;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
            border-color: transparent;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            opacity: 0.5;
        }

        .history-box {
            width: 100%;
            max-width: 584px;
            background-color: #303134;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #9aa0a6;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .history-clear { cursor: pointer; color: #fbbc05; }
        .history-items { display: flex; flex-direction: column; gap: 6px; }
        .history-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .history-text { cursor: pointer; flex: 1; }
        .history-del { cursor: pointer; opacity: 0.5; }

        /* Kafelki skrótów */
        .shortcuts-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .tile-wrapper {
            position: relative;
            width: 74px;
            text-align: center;
        }

        .tile {
            text-decoration: none;
            color: #bdc1c6;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tile-icon {
            width: 48px;
            height: 48px;
            background-color: #303134;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .tile-delete-btn {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            cursor: pointer;
            display: none;
        }

        .tile-wrapper:hover .tile-delete-btn { display: block; }


        /* ========================================================
           WIDOK 2: WYNIKI - IDEALNA KOPIA INTERFEJSU GOOGLE (BIAŁA)
           ======================================================== */
        #results-view {
            display: none;
            background-color: #ffffff;
            color: #202124;
            flex: 1;
            width: 100%;
        }

        /* Górny podpasek nawigacyjny Google */
        .google-nav-strip {
            border-bottom: 1px solid #ebebeb;
            padding: 0 160px;
            display: flex;
            gap: 20px;
            height: 48px;
            align-items: center;
            font-size: 14px;
            color: #5f6368;
        }

        .google-nav-item { cursor: pointer; padding-bottom: 12px; margin-top: 12px; border-bottom: 3px solid transparent; }
        .google-nav-item.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 500; }

        /* Główny kontener siatki wyników */
        .google-results-container {
            padding: 24px 160px;
            display: flex;
            gap: 60px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Lewa strona - standardowe wyniki */
        .google-left-content {
            flex: 1;
            max-width: 652px;
        }

        /* Sekcja Grafika */
        .google-section-title {
            font-size: 20px;
            color: #202124;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .google-images-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .google-image-card {
            width: calc(33.333% - 6px);
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f8f9fa;
            cursor: pointer;
        }

        .google-img-box {
            height: 114px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .google-img-text-box {
            padding: 8px;
            font-size: 12px;
            line-height: 1.34;
        }

        .google-img-title {
            color: #3c4043;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .google-img-source {
            color: #70757a;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }

        .google-more-images-btn {
            width: 100%;
            background-color: #f1f3f4;
            border: none;
            color: #3c4043;
            padding: 10px;
            border-radius: 100px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 32px;
            font-weight: 500;
        }
        .google-more-images-btn:hover { background-color: #e8eaed; }

        /* Sekcja "Więcej pytań" Accordion */
        .google-accordion-box {
            border-top: 1px solid #dadce0;
            border-bottom: 1px solid #dadce0;
            margin-bottom: 24px;
            padding: 4px 0;
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding
