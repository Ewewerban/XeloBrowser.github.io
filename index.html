<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xelo Browser – Dashboard Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #202124;
            color: #f1f3f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* Górny panel */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #1c1d20;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            z-index: 500;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mascot-logo {
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }

        .brand-name-top {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
        }

        .incognito-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .incognito-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Główny kontener */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .brand h1 {
            font-size: 44px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .brand-mascot {
            font-size: 65px;
            user-select: none;
        }

        /* Wyszukiwarka */
        .search-area {
            width: 100%;
            max-width: 560px;
            position: relative;
            margin-bottom: 35px;
            z-index: 1000;
        }

        .search-box {
            width: 100%;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #303134;
            color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }

        .search-box input:focus {
            background-color: #3c4043;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background-color: #303134;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            color: #e8eaed;
        }

        .suggestion-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Skróty (Kafelki) */
        .shortcuts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 650px;
            margin-bottom: 35px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            width: 80px;
            cursor: pointer;
        }

        .tile-icon {
            width: 60px;
            height: 60px;
            background-color: #303134;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, background-color 0.2s;
        }

        .tile:hover .tile-icon {
            transform: translateY(-4px);
            background-color: #3c4043;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tile-label {
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            opacity: 0.85;
        }

        /* Panel Historii */
        .history-box {
            width: 100%;
            max-width: 440px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .history-clear {
            cursor: pointer;
            color: #ff9400;
        }

        .history-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 130px;
            overflow-y: auto;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background-color: rgba(255, 255, 255, 0.04);
            padding: 8px 14px;
            border-radius: 8px;
            text-align: left;
        }

        .history-text {
            cursor: pointer;
            flex: 1;
        }

        .history-text:hover { text-decoration: underline; color: #ff9400; }

        .history-del {
            cursor: pointer;
            opacity: 0.4;
            padding-left: 10px;
        }
        .history-del:hover { opacity: 1; }

        /* Próbnik koloru */
        .picker-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            background-color: #303134;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .picker-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* OKNO COOKIES */
        .cookie-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(6px);
        }

        .cookie-window {
            background-color: #282a2d;
            border: 4px solid #ff9400;
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .cookie-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .cookie-window h2 {
            color: #ff9400;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .cookie-window p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
            color: #dae0e6;
        }

        .cookie-btns-container {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .c-btn {
            padding: 12px 26px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .c-accept { background-color: #ff9400; color: #111; }
        .c-deny { background-color: #4f5357; color: white; }

        body.incognito-mode {
            background-color: #15101c !important;
        }
        body.incognito-mode .top-bar {
            background-color: #0c0910;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-controls">
            <div class="mascot-logo" onclick="alert('Xelo Browser – Cheetah Edition v3.5')">🐆</div>
            <div class="brand-name-top">Xelo Browser</div>
        </div>
        <button class="incognito-btn" id="incog-toggle" onclick="toggleIncognito()">🕵️ Tryb Incognito</button>
    </div>

    <div class="main-content" id="bg-layer">
        <div class="brand">
            <div class="brand-mascot">🐆</div>
            <h1 id="brand-text">Xelo Browser</h1>
        </div>

        <div class="search-area">
            <div class="search-box">
                <input type="text" id="search-in" placeholder="Wyszukaj w Google..." onkeydown="handleEnter(event)" oninput="getSafeSuggestions(this.value)" autocomplete="off">
            </div>
            <div class="suggestions-list" id="sug-box"></div>
        </div>

        <div class="shortcuts-grid" id="shortcuts-grid"></div>

        <div class="history-box">
            <div class="history-header">
                <span>🕒 HISTORIA WYSZUKIWANIA</span>
                <span class="history-clear" onclick="clearHistory()">Wyczyść</span>
            </div>
            <div class="history-items" id="hist-list"></div>
        </div>

        <div class="picker-container">
            🎨
            <input type="color" class="picker-input" value="#202124" oninput="changeBg(this.value)">
        </div>
    </div>

    <div class="cookie-backdrop" id="cookie-modal">
        <div class="cookie-window">
            <div class="cookie-icon">🍪</div>
            <h2>Zgoda na pliki Cookies / Pamięć</h2>
            <p>Xelo Browser wymaga dostępu do funkcji LocalStorage Twojego urządzenia. Pozwala to na trwałe zapisywanie ulubionych kafelków stron, historii wyszukiwań oraz spersonalizowanych kolorów tła.</p>
            <div class="cookie-btns-container">
                <button class="c-btn c-accept" onclick="cookieDecision(true)">Akceptuję</button>
                <button class="c-btn c-deny" onclick="cookieDecision(false)">Blokuję pamięć</button>
            </div>
        </div>
    </div>

    <script>
        let storageAllowed = false;
        let incognito = false;
        
        let tiles = [
            { name: "Discord", url: "https://discord.com", icon: "💬" },
            { name: "YouTube", url: "https://youtube.com", icon: "📺" },
            { name: "Minecraft Wiki", url: "https://minecraft.wiki", icon: "🧱" },
            { name: "Allegro", url: "https://allegro.pl", icon: "📦" }
        ];
        
        let historyData = [];
        
        // Bogata i stabilna lokalna baza inteligentnych podpowiedzi
        const popularPhrases = [
            "discord", "youtube", "minecraft wiki", "allegro", "facebook", 
            "roblox", "gry online", "pogoda", "tłumacz google", "github", 
            "twitch", "wikipedia", "netflix", "poczta", "onet", "wp", "interia"
        ];

        window.onload = function() {
            try {
                const consent = localStorage.getItem('xelo_consent');
                if (consent === 'true') {
                    storageAllowed = true;
                    loadData();
                } else {
                    document.getElementById('cookie-modal').style.display = 'flex';
                }
            } catch(e) {
                document.getElementById('cookie-modal').style.display = 'flex';
            }
            renderTiles();
            renderHistory();
        };

        function cookieDecision(choice) {
            document.getElementById('cookie-modal').style.display = 'none';
            if (choice) {
                storageAllowed = true;
                try {
                    localStorage.setItem('xelo_consent', 'true');
                    saveTiles();
                } catch(e) {}
            } else {
                storageAllowed = false;
                try { localStorage.clear(); } catch(e) {}
            }
        }

        function loadData() {
            if (!storageAllowed) return;
            try {
                const c = localStorage.getItem('xelo_bg');
                if (c) changeBg(c);
                const t = localStorage.getItem('xelo_tiles');
                if (t) tiles = JSON.parse(t);
                const h = localStorage.getItem('xelo_hist');
                if (h) historyData = JSON.parse(h);
            } catch(e) {}
        }

        function changeBg(hex) {
            document.getElementById('bg-layer').style.backgroundColor = hex;
            if (storageAllowed && !incognito) {
                try { localStorage.setItem('xelo_bg', hex); } catch(e) {}
            }
        }

        function renderTiles() {
            const grid = document.getElementById('shortcuts-grid');
            grid.innerHTML = '';
            tiles.forEach(tile => {
                grid.innerHTML += `
                    <a href="${tile.url}" target="_blank" class="tile">
                        <div class="tile-icon">${tile.icon}</div>
                        <div class="tile-label">${tile.name}</div>
                    </a>
                `;
            });
            grid.innerHTML += `
                <div class="tile" onclick="addTile()">
                    <div class="tile-icon">➕</div>
                    <div class="tile-label">Dodaj</div>
                </div>
            `;
        }

        function addTile() {
            const name = prompt("Podaj nazwę strony:");
            if (!name) return;
            let url = prompt("Podaj adres URL (np. google.com):");
            if (!url) return;
            const icon = prompt("Podaj jedno emoji jako ikonę:") || "🌐";

            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
            tiles.push({ name, url, icon });
            renderTiles();
            saveTiles();
        }

        function saveTiles() {
            if (storageAllowed && !incognito) {
                try { localStorage.setItem('xelo_tiles', JSON.stringify(tiles)); } catch(e) {}
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                document.getElementById('sug-box').style.display = 'none';
                triggerSearch(e.target.value);
            }
        }

        function triggerSearch(val) {
            if (!val.trim()) return;
            if (!incognito) {
                historyData = historyData.filter(i => i !== val);
                historyData.unshift(val);
                if (historyData.length > 8) historyData.pop();
                renderHistory();
                if (storageAllowed) {
                    try { localStorage.setItem('xelo_hist', JSON.stringify(historyData)); } catch(e) {}
                }
            }
            window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
        }

        function renderHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = '';
            if (historyData.length === 0) {
                list.innerHTML = '<div style="font-size:12px; opacity:0.4; text-align:center;">Brak wpisów w historii</div>';
                return;
            }
            historyData.forEach((item, idx) => {
                list.innerHTML += `
                    <div class="history-row">
                        <span class="history-text" onclick="triggerSearch('${item}')">🔍 ${item}</span>
                        <span class="history-del" onclick="delHist(${idx})">❌</span>
                    </div>
                `;
            });
        }

        function delHist(idx) {
            historyData.splice(idx, 1);
            renderHistory();
            if (storageAllowed) {
                try { localStorage.setItem('xelo_hist', JSON.stringify(historyData)); } catch(e) {}
            }
        }

        function clearHistory() {
            historyData = [];
            renderHistory();
            if (storageAllowed) {
                try { localStorage.removeItem('xelo_hist'); } catch(e) {}
            }
        }

        /* CALKOWICIE BEZPIECZNE I SZYBKIE PODPOWIEDZI */
        function getSafeSuggestions(val) {
            const box = document.getElementById('sug-box');
            if (!val.trim()) { box.style.display = 'none'; return; }

            const query = val.toLowerCase();
            // Łączymy historię użytkownika ze stałymi frazami, eliminując powtórzenia
            const matches = [...new Set([...historyData, ...popularPhrases])]
                .filter(item => item.toLowerCase().includes(query))
                .slice(0, 5);

            if (matches.length === 0) { box.style.display = 'none'; return; }
            
            box.innerHTML = '';
            matches.forEach(txt => {
                const d = document.createElement('div');
                d.className = 'suggestion-item';
                d.innerText = txt;
                d.onclick = () => {
                    document.getElementById('search-in').value = txt;
                    box.style.display = 'none';
                    triggerSearch(txt);
                };
                box.appendChild(d);
            });
            box.style.display = 'flex';
        }

        function toggleIncognito() {
            incognito = !incognito;
            document.body.classList.toggle('incognito-mode', incognito);
            const btn = document.getElementById('incog-toggle');
            const title = document.getElementById('brand-text');

            if (incognito) {
                btn.innerText = "🕵️ Tryb Incognito: WŁĄCZONY";
                btn.style.borderColor = '#ff9400';
                title.innerText = "Xelo Browser (Incognito)";
            } else {
                btn.innerText = "🕵️ Tryb Incognito";
                btn.style.borderColor = '';
                title.innerText = "Xelo Browser";
            }
        }
    </script>
</body>
</html>
