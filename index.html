<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xelo Browser – Dashboard Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #202124;
            color: #f1f3f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* Górny panel funkcyjny */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #1c1d20;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            z-index: 500;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mascot-logo {
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }

        .brand-name-top {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
        }

        .incognito-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .incognito-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Główny kontener */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .brand h1 {
            font-size: 44px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .brand-mascot {
            font-size: 65px;
            user-select: none;
        }

        /* Wyszukiwarka i podpowiedzi */
        .search-area {
            width: 100%;
            max-width: 560px;
            position: relative;
            margin-bottom: 35px;
            z-index: 1000;
        }

        .search-box {
            width: 100%;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #303134;
            color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }

        .search-box input:focus {
            background-color: #3c4043;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background-color: #303134;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            color: #e8eaed;
        }

        .suggestion-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Skróty (Kafelki) */
        .shortcuts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 650px;
            margin-bottom: 35px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            width: 80px;
            cursor: pointer;
        }

        .tile-icon {
            width: 60px;
            height: 60px;
            background-color: #303134;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, background-color 0.2s;
        }

        .tile:hover .tile-icon {
            transform: translateY(-4px);
            background-color: #3c4043;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tile-label {
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            opacity: 0.85;
        }

        /* Panel Historii */
        .history-box {
            width: 100%;
            max-width: 440px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .history-clear {
            cursor: pointer;
            color: #ff9400;
            transition: opacity 0.2s;
        }

        .history-clear:hover { opacity: 0.8; }

        .history-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 130px;
            overflow-y: auto;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background-color: rgba(255, 255, 255, 0.04);
            padding: 8px 14px;
            border-radius: 8px;
            text-align: left;
        }

        .history-text {
            cursor: pointer;
            flex: 1;
        }

        .history-text:hover { text-decoration: underline; color: #ff9400; }

        .history-del {
            cursor: pointer;
            opacity: 0.4;
            padding-left: 10px;
            transition: opacity 0.2s;
        }
        .history-del:hover { opacity: 1; }

        /* Próbnik koloru w rogu */
        .picker-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            background-color: #303134;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .picker-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* POTĘŻNE POMARAŃCZOWE OKNO COOKIES */
        .cookie-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none; /* Sterowane bezpiecznie przez JS */
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(6px);
        }

        .cookie-window {
            background-color: #282a2d;
            border: 4px solid #ff9400; /* Piękna pomarańczowa ramka */
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .cookie-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        .cookie-window h2 {
            color: #ff9400;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .cookie-window p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
            color: #dae0e6;
        }

        .cookie-btns-container {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

            padding: 12px 26px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1
