<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloBrowser – Web Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar">
        <div class="mascot" title="Jestem Velo, maskotka przeglądarki!" onclick="aboutVelo()">🐆</div>
        
        <button class="btn" onclick="goBack()">←</button>
        <button class="btn" onclick="goForward()">→</button>
        <button class="btn" onclick="reloadPage()">↻</button>
        <button class="btn" onclick="goHome()">⌂</button>
        
        <input type="text" id="url-input" class="address-bar" value="https://www.bing.com" onkeydown="checkEnter(event)">
        
        <button class="btn" onclick="toggleTheme()" title="Zmień motyw">💡</button>
    </div>

    <iframe id="web-frame" class="browser-content" src="https://www.bing.com"></iframe>

    <script>
        const frame = document.getElementById('web-frame');
        const urlInput = document.getElementById('url-input');
        const homeUrl = "https://www.bing.com";

        function navigate() {
            let url = urlInput.value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            urlInput.value = url;
            frame.src = url;
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                navigate();
            }
        }

        function goHome() {
            urlInput.value = homeUrl;
            frame.src = homeUrl;
        }

        function reloadPage() {
            frame.src = frame.src;
        }

        // Funkcja przełączania motywów (Jasny / Ciemny)
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        // Kliknięcie w geparda wyświetla powitanie
        function aboutVelo() {
            alert("Cześć! Jestem Velo, maskotka tej przeglądarki. Szybki jak gepard!");
        }

        function goBack() { window.history.back(); }
        function goForward() { window.history.forward(); }
    </script>
</body>
</html>
