<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloBrowser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="left-controls" onclick="showDashboard()">
            <div class="brand-name-top">🐆 VeloBrowser</div>
        </div>
        <button class="incognito-btn">🕵️ Tryb Incognito</button>
    </div>

    <div class="main-content" id="bg-layer">
        
        <div id="dashboard-view">
            <div class="brand">
                <div class="brand-mascot">🐆</div>
                <h1>VeloBrowser</h1>
            </div>

            <div class="search-area">
                <div class="search-box">
                    <input type="text" id="search-in" placeholder="Wyszukaj w sieci..." onkeydown="handleEnter(event)" autocomplete="off">
                </div>
            </div>

            <div class="shortcuts-grid" id="shortcuts-grid"></div>

            <div class="history-box">
                <div class="history-header">
                    <span>🕒 HISTORIA WYSZUKIWANIA</span>
                    <span class="history-clear" onclick="clearHistory()">Wyczyść</span>
                </div>
                <div class="history-items" id="hist-list"></div>
            </div>
        </div>

        <div id="results-view">
            
            <div class="google-nav-strip">
                <div class="google-nav-item active">Wszystko</div>
                <div class="google-nav-item">Grafika</div>
                <div class="google-nav-item">Wideo</div>
                <div class="google-nav-item">Wiadomości</div>
                <div class="google-nav-item">Mapy</div>
            </div>

            <div class="google-results-container">
                
                <div class="google-left-content">
                    <div class="search-meta-info" id="search-meta-info">Około 0 wyników (0,12 s)</div>
                    
                    <div id="dynamic-results-list"></div>
                </div>

                <div class="google-right-sidebar" id="google-sidebar">
                    <div class="sidebar-title-row">
                        <h2 id="sidebar-term">Hasło</h2>
                    </div>
                    <div class="sidebar-subtitle">Wyszukiwanie globalne</div>
                    <div class="sidebar-meta-row">
                        <strong>Definicja:</strong> <span id="sidebar-desc">Brak dodatkowych danych strukturalnych dla tego zapytania.</span>
                    </div>
                    <div class="sidebar-meta-row">
                        <strong>Źródło:</strong> Indeksowanie sieci Web VeloBrowser
                    </div>
                </div>

            </div>
        </div>

        <div class="picker-container" id="picker-ui">
            🎨
            <input type="color" class="picker-input" value="#202124" oninput="changeBg(this.value)">
        </div>
    </div>

    <script>
        let historyData = [];
        let tiles = [
            { name: "Discord", url: "https://discord.com", icon: "💬" },
            { name: "YouTube", url: "https://youtube.com", icon: "📺" },
            { name: "GitHub", url: "https://github.com", icon: "🐙" }
        ];

        window.onload = function() {
            try {
                const h = localStorage.getItem('v_hist'); if (h) historyData = JSON.parse(h);
                const t = localStorage.getItem('v_tiles'); if (t) tiles = JSON.parse(t);
                const c = localStorage.getItem('v_bg'); if (c) changeBg(c);
            } catch(e) {}
            renderHistory();
            renderTiles();
        };

        function changeBg(hex) {
            document.getElementById('bg-layer').style.backgroundColor = hex;
            try { localStorage.setItem('v_bg', hex); } catch(e) {}
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                executeRealSearch(e.target.value);
            }
        }

        /* GŁÓWNY SILNIK GENEROWANIA NATURALNYCH WYNIKÓW WYSZUKIWANIA
           Zamiast jednego sztywnego obrazka, funkcja buduje dynamiczną listę powiązanych klocków.
        */
        function executeRealSearch(query) {
            if (!query.trim()) return;

            // Zapis do historii wyszukiwania
            historyData = historyData.filter(x => x !== query);
            historyData.unshift(query);
            if(historyData.length > 5) historyData.pop();
            renderHistory();
            try { localStorage.setItem('v_hist', JSON.stringify(historyData)); } catch(e) {}

            // Przełączenie interfejsu w czysty, biały widok wyników Google
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('picker-ui').style.display = 'none';
            document.getElementById('results-view').style.display = 'block';

            // Aktualizacja metadanych na panelu bocznym
            document.getElementById('sidebar-term').innerText = query;
            document.getElementById('sidebar-desc').innerText = `Wyszukano frazę "${query}" w bazie danych indeksu sieciowego. Zobacz powiązane wyniki po lewej stronie ekranu.`;
            document.getElementById('search-meta-info').innerText = `Około ${Math.floor(Math.random() * 1400000) + 50000} wyników (0,24 s) dla zapytania: ${query}`;

            // Generowanie bazy dynamicznych wyników dopasowanych do słowa kluczowego
            const resultsContainer = document.getElementById('dynamic-results-list');
            resultsContainer.innerHTML = ''; // czyszczenie poprzedniego stanu

            // Szablon generatora wyników (Zupełnie jak w Google!)
            const mockDatabase = [
                {
                    title: `${query} – Najważniejsze informacje i wiadomości`,
                    displayUrl: `https://www.onet.pl › wiadomosci › ${encodeURIComponent(query)}`,
                    link: `https://www.onet.pl`,
                    snippet: `Najświeższe informacje na temat <b>${query}</b>. Przeczytaj artykuły, analizy ekspertów, komentarze oraz dowiedz się więcej o najnowszych wydarzeniach z kraju i ze świata.`
                },
                {
                    title: `${query} w Wikipedii, wolnej encyklopedii`,
                    displayUrl: `https://pl.wikipedia.org › wiki › ${encodeURIComponent(query)}`,
                    link: `https://pl.wikipedia.org`,
                    snippet: `<b>${query}</b> – definicja, historia, zastosowanie oraz najważniejsze koncepcje. Zobacz spis treści, powiązane artykuły naukowe oraz przypisy bibliograficzne.`
                },
                {
                    title: `${query} - Filmy i materiały wideo w YouTube`,
                    displayUrl: `https://www.youtube.com › wyniki?search_query=${encodeURIComponent(query)}`,
                    link: `https://www.youtube.com`,
                    snippet: `Ciesz się filmami i muzyką, które kochasz, przesyłaj oryginalne treści i udostępniaj je znajomym, rodzinie i całemu światu w serwisie YouTube na hasło <b>${query}</b>.`
                },
                {
                    title: `Jak zacząć z ${query}? Poradnik dla początkujących`,
                    displayUrl: `https://www.poradnik-sieciowy.pl › poradniki › ${encodeURIComponent(query)}`,
                    link: `https://www.google.com`,
                    snippet: `Zastanawiasz się, jak podejść do zagadnienia jakim jest <b>${query}</b>? W tym kompleksowym przewodniku krok po kroku wyjaśniamy podstawowe błędy i najlepsze praktyki.`
                }
            ];

            // Renderowanie pętli do drzewa DOM
            mockDatabase.forEach(res => {
                resultsContainer.innerHTML += `
                    <div class="google-result-item">
                        <div class="res-url-row">
                            <span class="res-fav-mock">🌐</span>
                            <span class="res-display-url">${res.displayUrl}</span>
                        </div>
                        <a href="${res.link}" target="_blank" class="res-title">${res.title}</a>
                        <div class="res-snippet">${res.snippet}</div>
                    </div>
                `;
            });
        }

        function showDashboard() {
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'flex';
            document.getElementById('picker-ui').style.display = 'flex';
            document.getElementById('search-in').value = '';
        }

        function renderHistory() {
            const list = document.getElementById('hist-list'); list.innerHTML = '';
            if (historyData.length === 0) { list.innerHTML = '<div style="font-size:12px; opacity:0.4; text-align:center; padding:10px;">Brak wpisów w historii</div>'; return; }
            historyData.forEach((item, idx) => {
                list.innerHTML += `
                    <div class="history-row">
                        <span class="history-text" onclick="document.getElementById('search-in').value='${item}'; executeRealSearch('${item}')">🔍 ${item}</span>
                        <span class="history-del" onclick="deleteHistory(${idx})">❌</span>
                    </div>
                `;
            });
        }

        function deleteHistory(idx) {
            historyData.splice(idx, 1); renderHistory();
            try { localStorage.setItem('v_hist', JSON.stringify(historyData)); } catch(e) {}
        }

        function clearHistory() {
            historyData = []; renderHistory();
            try { localStorage.removeItem('v_hist'); } catch(e) {}
        }

        function renderTiles() {
            const grid = document.getElementById('shortcuts-grid'); grid.innerHTML = '';
            tiles.forEach((tile, index) => {
                grid.innerHTML += `
                    <div class="tile-wrapper">
                        <button class="tile-delete-btn" onclick="deleteTile(${index})">❌</button>
                        <a href="${tile.url}" target="_blank" class="tile">
                            <div class="tile-icon">${tile.icon}</div>
                            <div class="tile-name-txt">${tile.name}</div>
                        </a>
                    </div>
                `;
            });
            grid.innerHTML += `
                <div class="tile-wrapper" onclick="addTile()">
                    <div class="tile"><div class="tile-icon">➕</div><div class="tile-name-txt">Dodaj</div></div>
                </div>
            `;
        }

        function addTile() {
            const name = prompt("Nazwa skrótu:"); if (!name) return;
            let url = prompt("Adres URL strony:"); if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            tiles.push({ name, url, icon: "🌐" }); renderTiles();
            try { localStorage.setItem('v_tiles', JSON.stringify(tiles)); } catch(e) {}
        }

        function deleteTile(idx) {
            tiles.splice(idx, 1); renderTiles();
            try { localStorage.setItem('v_tiles', JSON.stringify(tiles)); } catch(e) {}
        }
    </script>
</body>
</html>
