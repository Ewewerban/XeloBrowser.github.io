<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xelo Browser – Dashboard Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #202124;
            color: #f1f3f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* Górny panel */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #1c1d20;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            z-index: 500;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mascot-logo {
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }

        .brand-name-top {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
            cursor: pointer;
            user-select: none;
        }

        .incognito-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        /* Główny kontener */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* WIDOK 1: DASHBOARD */
        #dashboard-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .brand h1 {
            font-size: 44px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .brand-mascot {
            font-size: 65px;
            user-select: none;
        }

        /* Wyszukiwarka */
        .search-area {
            width: 100%;
            max-width: 560px;
            position: relative;
            margin-bottom: 35px;
            z-index: 1000;
        }

        .search-box {
            width: 100%;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #303134;
            color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background-color: #303134;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1100;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            color: #e8eaed;
        }

        .suggestion-item:hover { background-color: rgba(255, 255, 255, 0.08); }

        /* Kafelki ze skrótami */
        .shortcuts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 650px;
            margin-bottom: 35px;
        }

        .tile-wrapper { position: relative; width: 80px; }
        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            width: 100%;
        }

        .tile-icon {
            width: 60px;
            height: 60px;
            background-color: #303134;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, background-color 0.2s;
        }

        .tile-wrapper:hover .tile-icon {
            transform: translateY(-4px);
            background-color: #3c4043;
        }

        .tile-label {
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            opacity: 0.85;
        }

        .tile-delete-btn {
            position: absolute;
            top: -6px;
            right: 2px;
            background-color: #ea4335;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tile-wrapper:hover .tile-delete-btn { opacity: 1; }

        /* Panel Historii */
        .history-box {
            width: 100%;
            max-width: 440px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
